name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Automatically determines the next version (semver) based on PR labels
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'feat'
      - 'feature'
      - 'minor'
  patch:
    labels:
      - 'fix'
      - 'bug'
      - 'patch'
  default: patch

# Categories matching the Keep a Changelog format we just added
categories:
  - title: '🚀 Added'
    labels:
      - 'feat'
      - 'feature'
      - 'enhancement'
  - title: '🔄 Changed'
    labels:
      - 'refactor'
      - 'performance'
      - 'change'
  - title: '🐛 Fixed'
    labels:
      - 'fix'
      - 'bug'
  - title: '📝 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🔒 Security'
    labels:
      - 'security'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

template: |
  ## What's Changed

  $CHANGES

  *Thank you to our amazing contributors!*