name: Release Drafter

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
